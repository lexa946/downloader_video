{% extends 'base.html' %}

{% block title %}Админка — {{ 'Редактировать' if is_edit else 'Новый пост' }}{% endblock %}

{% block head %}
  <link rel="stylesheet" href="/static/css/admin.css">
  <!-- TinyMCE CDN -->
  <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/7/tinymce.min.js" referrerpolicy="origin"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      tinymce.init({
        selector: '#content',
        height: 600,
        menubar: true,
        plugins: 'link image lists table code codesample media autoresize',
        toolbar: 'undo redo | blocks | bold italic underline | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image media | table | removeformat | code codesample',
        content_style: 'body { font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu; font-size:16px }',
      });
    });
  </script>
{% endblock %}

{% block content %}
<main class="main">
  <div class="container" style="max-width: 960px;">
    <h1>{{ 'Редактировать пост' if is_edit else 'Новый пост' }}</h1>
    <form method="post" action="{{ '/admin/posts/' ~ post.id if is_edit else '/admin/posts' }}">
      <div class="form-row">
        <label>Слаг</label>
        <input type="text" name="slug" value="{{ post.slug if post else '' }}" required />
      </div>
      <div class="form-row">
        <label>Заголовок</label>
        <input type="text" name="title" value="{{ post.title if post else '' }}" required />
      </div>
      <div class="form-row">
        <label>Подзаголовок</label>
        <input type="text" name="subtitle" value="{{ post.subtitle if post else '' }}" />
      </div>
      <div class="form-row">
        <label>Краткое описание</label>
        <textarea name="excerpt" rows="3">{{ post.excerpt if post else '' }}</textarea>
      </div>
      <div class="form-row">
        <label>Контент</label>
        <textarea id="content" name="content" rows="20">{{ post.content | safe if post else '' }}</textarea>
      </div>
      <div class="form-row">
        <label>Ссылка на обложку</label>
        <input type="text" name="cover_image_url" value="{{ post.cover_image_url if post else '' }}" />
      </div>
      <div class="form-row">
        <label>Теги (через запятую)</label>
        <input type="text" name="tags" value="{{ post.tags|join(', ') if post and post.tags else '' }}" />
      </div>
      <div class="form-row">
        <label>Язык</label>
        <input type="text" name="language" value="{{ post.language if post else 'ru' }}" />
      </div>
      <div class="form-row">
        <label>Статус</label>
        <select name="status_value">
          {% for st in statuses %}
            <option value="{{ st.value }}" {% if post and post.status == st %}selected{% endif %}>{{ st.value }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-row">
        <label>Вывести на витрину</label>
        <input type="checkbox" name="is_featured" value="1" {% if post and post.is_featured %}checked{% endif %} />
      </div>
      <div class="form-row">
        <label>Meta title</label>
        <input type="text" name="meta_title" value="{{ post.meta_title if post else '' }}" />
      </div>
      <div class="form-row">
        <label>Meta description</label>
        <input type="text" name="meta_description" value="{{ post.meta_description if post else '' }}" />
      </div>
      <div class="form-row">
        <label>OG Image</label>
        <input type="text" name="og_image_url" value="{{ post.og_image_url if post else '' }}" />
      </div>
      <div class="form-row">
        <label>Canonical URL</label>
        <input type="text" name="canonical_url" value="{{ post.canonical_url if post else '' }}" />
      </div>
      <div class="form-row">
        <label>Источник</label>
        <input type="text" name="source_url" value="{{ post.source_url if post else '' }}" />
      </div>
      <div class="form-row">
        <label>Дата публикации (ISO)</label>
        <input type="text" name="published_at" placeholder="2025-08-15T00:00:00+03:00" value="{{ post.published_at if post else '' }}" />
      </div>
      <div class="form-row">
        <button type="submit" class="cta-button">Сохранить</button>
        <a class="cta-button" style="background:#666;" href="/admin/posts">Отмена</a>
      </div>
    </form>
  </div>
</main>
{% endblock %}
